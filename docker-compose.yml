version: '3.9'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: rag_user
      POSTGRES_PASSWORD: rag_password
      POSTGRES_DB: rag_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'

  qdrant:
    image: qdrant/qdrant:latest
    environment:
      QDRANT_API_KEY: qdrant_key_123
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - '6333:6333'

volumes:
  postgres_data:
  qdrant_data:

services:
  qdrant:
    image: qdrant/qdrant:latest
    environment:
      QDRANT_API_KEY: qdrant_key_123
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - '6333:6333'

  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    ports:
      - '8000:8000'
    depends_on:
      - qdrant

  frontend:
    build: ./frontend
    ports:
      - '80:80'
    depends_on:
      - backend

volumes:
  qdrant_data:
